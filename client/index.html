<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- Core SEO Meta Tags -->
    <title>COMCUBES - Global Business Directory | Find Companies, Industries & Business Sectors</title>
    <meta name="description" content="Discover over 2,000 companies across 180+ industries in COMCUBES Global Business Directory. Find businesses, explore industry sectors, and connect with companies worldwide." />
    <meta name="keywords" content="business directory, global companies, industry sectors, business listings, company database, commercial directory, business search, industry database, corporate directory, business intelligence" />
    <meta name="author" content="COMCUBES Global Business Directory" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="COMCUBES - Global Business Directory" />
    <meta property="og:description" content="Discover over 2,000 companies across 180+ industries in COMCUBES Global Business Directory. Find businesses, explore industry sectors, and connect with companies worldwide." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://comcubes.com" />
    <meta property="og:site_name" content="COMCUBES Global Business Directory" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@comcubes" />
    <meta name="twitter:creator" content="@comcubes" />
    <meta name="twitter:title" content="COMCUBES - Global Business Directory" />
    <meta name="twitter:description" content="Discover over 2,000 companies across 180+ industries in COMCUBES Global Business Directory." />
    
    <!-- Additional SEO Meta Tags -->
    <meta name="theme-color" content="#3B82F6" />
    <meta name="msapplication-TileColor" content="#3B82F6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.google.com" />
    <link rel="preconnect" href="https://customsearch.googleapis.com" />
    
    <!-- Structured Data - Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "COMCUBES Global Business Directory",
      "alternateName": ["COMCUBES", "Commercial Cubes"],
      "description": "Global business directory featuring companies, industries, and business sectors worldwide",
      "url": "https://comcubes.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://comcubes.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "mainEntity": {
        "@type": "Organization",
        "name": "COMCUBES",
        "url": "https://comcubes.com",
        "logo": "https://comcubes.com/logo.png",
        "sameAs": [
          "https://twitter.com/comcubes",
          "https://linkedin.com/company/comcubes"
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
